name: Compilar Mac y Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Escribe el nombre EXACTO del tag de tu release actual (ej. v1.0.0)'
        required: true
        default: 'v1.0.0-beta'

jobs:
  build-and-upload:
    permissions:
      contents: write
    
    # ⚠️ REVISIÓN AQUÍ: Esto le dice a GitHub que use el entorno que creaste
    environment: '.env' 
    
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias de Node
        run: npm install

      - name: Compilar y añadir a la Release existente
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ahora sí, al haber declarado el environment arriba, leerá estos valores de ahí adentro:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseDraft: false
          prerelease: false
